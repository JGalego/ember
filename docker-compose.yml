services:
  api:
    build: .
    image: ember:latest
    ports:
      - "8000:8000"
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    environment:
      - PYTHONUNBUFFERED=1

  train:
    build: .
    image: ember:latest
    command: ["python", "scripts/train.py", "dataset=sudoku"]
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    environment:
      - PYTHONUNBUFFERED=1
    # GPU passthrough (requires nvidia-container-toolkit on the host):
