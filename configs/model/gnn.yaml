# GNN encoder + MLP energy/decoder. Best suited to graph_coloring, where the
# problem's adjacency matrix is passed to the encoder; for other domains the
# encoder falls back to a fully-connected pseudo-graph over n_nodes chunks.
encoder:
  kind: gnn
  latent_dim: 64
  n_nodes: 16
  node_dim: 32
  n_layers: 3
energy:
  kind: mlp
  hidden_dims: [256, 256]
decoder:
  kind: mlp
  hidden_dims: [256, 256]
