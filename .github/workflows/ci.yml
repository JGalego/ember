name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Test (pytest)
        run: pytest tests/ -q --cov=ember --cov-report=term-missing

  smoke-train:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Tiny end-to-end training run (sanity check, not a real training job)
        run: |
          python scripts/train.py \
            dataset=sudoku dataset.n_train=16 dataset.n_val=8 \
            training.max_epochs=1 training.batch_size=8 \
            checkpoint_dir=/tmp/ember-ci-ckpt

      - name: Tiny benchmark comparison
        run: |
          python scripts/run_benchmarks.py --domain graph_coloring --n_test 3 \
            --n_train_baseline 8 --sa_steps 50 --beam_steps 10 --ebm_max_iters 30
